- op: replace
  path: /work/0/highlights
  value:
  - Led development of Magic SDK — a developer-facing authentication platform — scaling from 16K to 200K+ developers, including re-architecting a synchronous platform to scale from 100K to 1M+ active users in under 30 days to close a $1M ARR enterprise contract.
  - Architected and launched Wallet-as-a-Service, driving $3M in ARR and enabling enterprise web3 adoption for clients including PayPal, Clubhouse, Mattel, Macy's, 7-Eleven, and Forbes.
  - Built an internal developer tooling ecosystem (CRUD Router, CLI Router, Factor Verifier, Deferred Calls, ORM Signals) adopted across backend teams that reduced feature development time by ~50% based on feedback from internal teams, while improving code quality and reducing technical debt.
  - Reduced API endpoint error rates and improved latency by 5–10x by building systematic observability tooling and conducting root cause analysis on P0/P1 incidents through rigorous on-call rotations.
  - Mitigated phishing attacks with minimal impact to user experience by designing and implementing a device-based cryptographic root-of-trust protocol securing over 3M devices, resulting in patent "Anonymous Device Fingerprinting for Device Verification".
  - Mentored 8-10 backend engineers across multiple teams through structured 1:1s, pairing sessions, technical design reviews, and establishing comprehensive engineering documentation covering Python style guides, API standards, and testing best practices.

